<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Email Verification</title>
</head>
<body style="margin:0; padding:0; font-family: Arial, sans-serif; background-color:#f4f4f4;">
<div style="max-width:600px; margin:40px auto; background:#ffffff; padding:30px; border-radius:10px; text-align:center;">
    <h2 style="color:#333;">Email Verification</h2>

    <p style="font-size:16px; color:#555;">
        Thank you for signing up. Please use the verification code below to activate your account:
    </p>

    <div style="margin:20px 0; font-size:28px; letter-spacing:6px; font-weight:bold; color:#2c3e50;">
        {verificationCode}
    </div>

    <p style="font-size:14px; color:#888;">
        This code will expire in 20 minutes. If you did not request this, you can ignore this email.
    </p>

    <hr style="margin:30px 0; border:none; border-top:1px solid #eee;">

    <p style="font-size:12px; color:#aaa;">
        Bank's API Service
    </p>
</div>
</body>
</html>
